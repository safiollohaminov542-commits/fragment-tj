{% extends 'base.html' %}
{% block title %}{{ t('profile.edit') }} — {{ site_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto animate-slide-up">
  <a href="{{ url_for('profile.index') }}" class="text-sm text-gray-400 hover:text-white">← {{ t('common.back') }}</a>
  <h1 class="text-2xl font-bold my-4">{{ t('profile.edit') }}</h1>

  <form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="rounded-2xl bg-panel border border-white/10 p-5 space-y-4">
      <div>
        <label class="block text-xs uppercase text-gray-500 mb-1.5">{{ t('auth.name') }}</label>
        <input type="text" name="name" value="{{ current_user.name or '' }}" maxlength="120"
               class="w-full px-4 py-2.5 rounded-xl bg-bg border border-white/10" />
      </div>
      <div>
        <label class="block text-xs uppercase text-gray-500 mb-1.5">{{ t('profile.telegram_username') }}</label>
        <input type="text" name="telegram_username" value="{{ current_user.telegram_username or '' }}"
               placeholder="username (бе @)"
               class="w-full px-4 py-2.5 rounded-xl bg-bg border border-white/10" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs uppercase text-gray-500 mb-1.5">{{ t('profile.preferred_language') }}</label>
          <select name="preferred_language" class="w-full px-4 py-2.5 rounded-xl bg-bg border border-white/10">
            <option value="tg" {% if current_user.preferred_language == 'tg' %}selected{% endif %}>Тоҷикӣ</option>
            <option value="ru" {% if current_user.preferred_language == 'ru' %}selected{% endif %}>Русский</option>
          </select>
        </div>
        <div>
          <label class="block text-xs uppercase text-gray-500 mb-1.5">{{ t('profile.preferred_currency') }}</label>
          <select name="preferred_currency" class="w-full px-4 py-2.5 rounded-xl bg-bg border border-white/10">
            <option value="TJS" {% if current_user.preferred_currency == 'TJS' %}selected{% endif %}>TJS</option>
            <option value="TON" {% if current_user.preferred_currency == 'TON' %}selected{% endif %}>TON</option>
            <option value="USD" {% if current_user.preferred_currency == 'USD' %}selected{% endif %}>USD</option>
          </select>
        </div>
      </div>
    </div>

    <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-accent to-accent2 text-white font-semibold shadow-lg shadow-accent/30">
      {{ t('common.save') }}
    </button>
  </form>
</div>
{% endblock %}

<nav class="sticky top-0 z-40 backdrop-blur-xl bg-bg/70 border-b border-white/5">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between">
    <a href="{{ url_for('main.index') }}" class="flex items-center gap-2 group">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-accent2 flex items-center justify-center font-bold text-white shadow-lg shadow-accent/30 group-hover:scale-105 transition">
        F
      </div>
      <span class="font-bold text-lg tracking-tight">Fragment <span class="text-accent">TJ</span></span>
    </a>

    <div class="hidden md:flex items-center gap-1">
      <a href="{{ url_for('main.index') }}" class="px-4 py-2 rounded-lg hover:bg-white/5 transition text-sm">Асосӣ</a>
      <a href="{{ url_for('main.gifts_list') }}" class="px-4 py-2 rounded-lg hover:bg-white/5 transition text-sm">Gifts</a>

    </div>

    <div class="flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-xs">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="text-gray-400">1 TON =</span>
        <span class="font-semibold text-accent">{{ "%.2f"|format(ton_rate) }} TJS</span>
      </div>

      {% if current_user.is_authenticated %}
        <div class="relative group">
          <button class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 transition">
            {% if current_user.photo_url %}
              <img src="{{ current_user.photo_url }}" class="w-6 h-6 rounded-full" alt="" />
            {% else %}
              <div class="w-6 h-6 rounded-full bg-gradient-to-br from-accent to-accent2 flex items-center justify-center text-xs font-bold">
                {{ current_user.initial }}
              </div>
            {% endif %}
            <span class="hidden sm:inline text-sm">{{ current_user.display_name }}</span>
          </button>
          <div class="absolute right-0 mt-2 w-48 rounded-xl bg-panel border border-white/10 shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition z-50">

              <a href="{{ url_for('admin.dashboard') }}" class="block px-4 py-2.5 hover:bg-white/5 text-sm text-accent">Admin Panel</a>
